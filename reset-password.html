<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات هَب | تعيين كلمة المرور الجديدة - Reset Password</title>
    <meta name="description" content="قم بتعيين كلمة مرور جديدة وقوية لحسابك في منصة شات هَب.">
    
    <!-- Google Fonts: Cairo & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            900: '#312e81',
                        },
                        emerald: {
                            500: '#10b981',
                            600: '#059669',
                        },
                        salla: '#004956',
                        sallaAccent: '#00DA90',
                        darkBg: '#080C14',
                        darkCard: '#111827',
                        darkBorder: '#1F2937'
                    },
                    fontFamily: {
                        sans: ['Cairo', 'Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS -->
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #080C14;
            color: #F3F4F6;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .bg-grid-pattern {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }

        .auth-input {
            background: rgba(11, 16, 29, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .auth-input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
            background: rgba(15, 23, 42, 0.9);
        }

        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-animate {
            animation: slideInUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-[#080C14] text-slate-100 antialiased min-h-screen flex flex-col justify-between relative bg-grid-pattern selection:bg-brand-500 selection:text-white">

    <!-- Ambient Glows -->
    <div class="fixed top-1/4 -right-20 w-[450px] h-[450px] bg-emerald-600/15 rounded-full blur-[140px] pointer-events-none"></div>
    <div class="fixed bottom-10 -left-20 w-[400px] h-[400px] bg-brand-500/10 rounded-full blur-[130px] pointer-events-none"></div>

    <!-- Header Navigation -->
    <header class="w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex items-center justify-between relative z-20">
        <a href="index.html" class="flex items-center gap-3 group">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-brand-600 via-brand-500 to-emerald-500 flex items-center justify-center shadow-lg shadow-brand-500/20 group-hover:scale-105 transition-transform">
                <i class="fa-solid fa-comments text-white text-xl"></i>
            </div>
            <span class="text-2xl font-black tracking-tight text-white">Chat<span class="text-brand-500">Hub</span></span>
        </a>

        <a href="login.html" class="glass-panel hover:bg-white/10 text-slate-300 hover:text-white px-4 py-2 rounded-xl text-xs font-bold transition-all border border-white/10 flex items-center gap-2">
            <i class="fa-solid fa-arrow-right"></i>
            <span>إلغاء والعودة</span>
        </a>
    </header>

    <!-- Main Card -->
    <main class="flex-grow flex items-center justify-center px-4 py-8 relative z-10">
        <div class="w-full max-w-md">
            
            <div class="glass-panel rounded-3xl p-6 sm:p-8 border border-white/10 shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-emerald-500 via-brand-500 to-indigo-500"></div>

                <!-- Icon Badge -->
                <div class="w-14 h-14 rounded-2xl bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center text-emerald-400 mx-auto mb-6 text-2xl shadow-lg shadow-emerald-500/10">
                    <i class="fa-solid fa-lock text-emerald-400"></i>
                </div>

                <!-- Header Text -->
                <div class="text-center mb-8">
                    <h1 class="text-2xl sm:text-3xl font-black text-white tracking-tight mb-2">
                        تعيين كلمة المرور الجديدة
                    </h1>
                    <p class="text-xs sm:text-sm text-slate-400">
                        أنشئ كلمة مرور جديدة وقوية لحماية حسابك واستعادة الوصول لخدماتك
                    </p>
                </div>

                <!-- RESET FORM -->
                <form id="reset-pass-form" onsubmit="handleResetSubmit(event)" class="space-y-5">
                    
                    <!-- New Password Input -->
                    <div>
                        <label class="block text-xs font-bold text-slate-300 mb-1.5" for="new-pass">كلمة المرور الجديدة</label>
                        <div class="relative">
                            <i class="fa-solid fa-lock absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                            <input type="password" id="new-pass" onkeyup="checkPasswordStrength()" required placeholder="••••••••" class="w-full pr-10 pl-10 py-3 rounded-xl text-xs auth-input">
                            <button type="button" onclick="togglePass('new-pass', this)" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300">
                                <i class="fa-solid fa-eye text-xs"></i>
                            </button>
                        </div>
                        
                        <!-- Password Strength Bar -->
                        <div class="mt-2 flex items-center gap-2">
                            <div class="flex-grow h-1.5 bg-slate-800 rounded-full overflow-hidden">
                                <div id="strength-bar" class="h-full w-0 bg-rose-500 transition-all duration-300"></div>
                            </div>
                            <span id="strength-text" class="text-[10px] text-slate-400 font-bold w-16 text-left">ضعيفة</span>
                        </div>
                    </div>

                    <!-- Confirm Password Input -->
                    <div>
                        <label class="block text-xs font-bold text-slate-300 mb-1.5" for="confirm-pass">تأكيد كلمة المرور الجديدة</label>
                        <div class="relative">
                            <i class="fa-solid fa-shield-halved absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                            <input type="password" id="confirm-pass" onkeyup="checkMatch()" required placeholder="••••••••" class="w-full pr-10 pl-10 py-3 rounded-xl text-xs auth-input">
                            <button type="button" onclick="togglePass('confirm-pass', this)" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300">
                                <i class="fa-solid fa-eye text-xs"></i>
                            </button>
                        </div>
                        <span id="match-error" class="text-[10px] text-rose-400 mt-1 hidden block">كلمتا المرور غير متطابقتين</span>
                    </div>

                    <!-- Guidelines checklist -->
                    <div class="p-3 bg-slate-900/60 rounded-xl border border-slate-800/80 space-y-1.5 text-[11px]">
                        <div class="text-slate-400 font-bold mb-1">شروط كلمة المرور:</div>
                        <div id="check-len" class="flex items-center gap-2 text-slate-500">
                            <i class="fa-solid fa-circle-check text-xs"></i>
                            <span>8 أحرف على الأقل</span>
                        </div>
                        <div id="check-num" class="flex items-center gap-2 text-slate-500">
                            <i class="fa-solid fa-circle-check text-xs"></i>
                            <span>تتضمن رقم واحد وحرف خاص على الأقل</span>
                        </div>
                    </div>

                    <button type="submit" class="w-full py-3.5 px-4 bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 text-white font-bold text-xs sm:text-sm rounded-xl shadow-lg shadow-emerald-500/25 transition-all flex items-center justify-center gap-2 active:scale-95">
                        <span>حفظ كلمة المرور الجديدة</span>
                        <i class="fa-solid fa-check text-xs"></i>
                    </button>
                </form>

            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full max-w-7xl mx-auto px-4 py-4 text-center text-xs text-slate-500 relative z-20">
        جميع الحقوق محفوظة © 2026 ChatHub SaaS Inc.
    </footer>

    <div id="toast-container" class="fixed bottom-5 left-5 z-50 flex flex-col gap-3 max-w-sm"></div>

    <script>
        function togglePass(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa-solid fa-eye-slash text-xs';
            } else {
                input.type = 'password';
                icon.className = 'fa-solid fa-eye text-xs';
            }
        }

        function checkPasswordStrength() {
            const pass = document.getElementById('new-pass').value;
            const bar = document.getElementById('strength-bar');
            const text = document.getElementById('strength-text');

            const checkLen = document.getElementById('check-len');
            const checkNum = document.getElementById('check-num');

            let score = 0;

            if (pass.length >= 8) {
                score += 1;
                checkLen.className = 'flex items-center gap-2 text-emerald-400';
            } else {
                checkLen.className = 'flex items-center gap-2 text-slate-500';
            }

            if (/[0-9]/.test(pass) && /[^A-Za-z0-9]/.test(pass)) {
                score += 1;
                checkNum.className = 'flex items-center gap-2 text-emerald-400';
            } else {
                checkNum.className = 'flex items-center gap-2 text-slate-500';
            }

            if (pass.length >= 12) score += 1;

            if (score === 0) {
                bar.style.width = '10%';
                bar.className = 'h-full bg-rose-500 transition-all duration-300';
                text.innerText = 'ضعيفة جداً';
                text.className = 'text-[10px] text-rose-400 font-bold w-16 text-left';
            } else if (score === 1) {
                bar.style.width = '40%';
                bar.className = 'h-full bg-amber-500 transition-all duration-300';
                text.innerText = 'متوسطة';
                text.className = 'text-[10px] text-amber-400 font-bold w-16 text-left';
            } else if (score >= 2) {
                bar.style.width = '100%';
                bar.className = 'h-full bg-emerald-500 transition-all duration-300';
                text.innerText = 'قوية جداً';
                text.className = 'text-[10px] text-emerald-400 font-bold w-16 text-left';
            }

            checkMatch();
        }

        function checkMatch() {
            const p1 = document.getElementById('new-pass').value;
            const p2 = document.getElementById('confirm-pass').value;
            const err = document.getElementById('match-error');

            if (p2 && p1 !== p2) {
                err.classList.remove('hidden');
                return false;
            } else {
                err.classList.add('hidden');
                return true;
            }
        }

        function handleResetSubmit(e) {
            e.preventDefault();
            const p1 = document.getElementById('new-pass').value;
            const p2 = document.getElementById('confirm-pass').value;

            if (p1.length < 8) {
                showToast('خطأ', 'كلمة المرور قصيرة جداً (أقل من 8 أحرف)', 'fa-solid fa-circle-xmark text-rose-400');
                return;
            }

            if (p1 !== p2) {
                showToast('تنبيه', 'كلمتا المرور غير متطابقتين', 'fa-solid fa-triangle-exclamation text-amber-400');
                return;
            }

            showToast('تمت العملية بنجاح! 🎉', 'تم تحديث كلمة المرور. جاري إعادة توجيهك لتسجيل الدخول...', 'fa-solid fa-circle-check text-emerald-400');
            setTimeout(() => {
                window.location.href = 'auth.html';
            }, 2000);
        }

        function showToast(title, desc, iconClass = 'fa-solid fa-bell text-brand-400') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'glass-panel border border-brand-500/40 p-3.5 rounded-2xl shadow-2xl flex items-center gap-3 toast-animate bg-[#0D1424] text-right';
            
            toast.innerHTML = `
                <div class="w-9 h-9 rounded-xl bg-slate-800 flex items-center justify-center text-lg shrink-0">
                    <i class="${iconClass}"></i>
                </div>
                <div>
                    <h5 class="text-xs font-bold text-white">${title}</h5>
                    <p class="text-[11px] text-slate-300 leading-tight mt-0.5">${desc}</p>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }
    </script>
</body>
</html>
