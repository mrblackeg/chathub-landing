
<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات هَب | استعادة كلمة المرور - Forgot Password</title>
    <meta name="description" content="استعادة كلمة المرور لحسابك في منصة شات هَب عبر البريد الإلكتروني أو رقم الجوال.">
    
    <!-- Google Fonts: Cairo & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            900: '#312e81',
                        },
                        emerald: {
                            500: '#10b981',
                            600: '#059669',
                        },
                        salla: '#004956',
                        sallaAccent: '#00DA90',
                        darkBg: '#080C14',
                        darkCard: '#111827',
                        darkBorder: '#1F2937'
                    },
                    fontFamily: {
                        sans: ['Cairo', 'Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS for Polish -->
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #080C14;
            color: #F3F4F6;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .bg-grid-pattern {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }

        .auth-input {
            background: rgba(11, 16, 29, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .auth-input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
            background: rgba(15, 23, 42, 0.9);
        }

        .otp-input {
            width: 3rem;
            height: 3.5rem;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 800;
            border-radius: 0.75rem;
        }

        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-animate {
            animation: slideInUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-[#080C14] text-slate-100 antialiased min-h-screen flex flex-col justify-between relative bg-grid-pattern selection:bg-brand-500 selection:text-white">

    <!-- Ambient Glows -->
    <div class="fixed top-1/4 -right-20 w-[450px] h-[450px] bg-brand-600/15 rounded-full blur-[140px] pointer-events-none"></div>
    <div class="fixed bottom-10 -left-20 w-[400px] h-[400px] bg-amber-500/10 rounded-full blur-[130px] pointer-events-none"></div>

    <!-- Header Navigation -->
    <header class="w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex items-center justify-between relative z-20">
        <a href="index.html" class="flex items-center gap-3 group">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-brand-600 via-brand-500 to-emerald-500 flex items-center justify-center shadow-lg shadow-brand-500/20 group-hover:scale-105 transition-transform">
                <i class="fa-solid fa-comments text-white text-xl"></i>
            </div>
            <span class="text-2xl font-black tracking-tight text-white">Chat<span class="text-brand-500">Hub</span></span>
        </a>

        <a href="login.html" class="glass-panel hover:bg-white/10 text-slate-300 hover:text-white px-4 py-2 rounded-xl text-xs font-bold transition-all border border-white/10 flex items-center gap-2">
            <i class="fa-solid fa-arrow-right"></i>
            <span>العودة لتسجيل الدخول</span>
        </a>
    </header>

    <!-- Main Card -->
    <main class="flex-grow flex items-center justify-center px-4 py-8 relative z-10">
        <div class="w-full max-w-md">
            
            <div class="glass-panel rounded-3xl p-6 sm:p-8 border border-white/10 shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-amber-500 via-brand-500 to-emerald-500"></div>

                <!-- Icon Badge -->
                <div class="w-14 h-14 rounded-2xl bg-brand-500/10 border border-brand-500/20 flex items-center justify-center text-brand-400 mx-auto mb-6 text-2xl shadow-lg shadow-brand-500/10">
                    <i class="fa-solid fa-key text-amber-400"></i>
                </div>

                <!-- Card Header -->
                <div class="text-center mb-8">
                    <h1 id="step-title" class="text-2xl sm:text-3xl font-black text-white tracking-tight mb-2">
                        استعادة كلمة المرور
                    </h1>
                    <p id="step-subtitle" class="text-xs sm:text-sm text-slate-400">
                        أدخل بريدك الإلكتروني أو رقم الجوال المسجل لاستلام رمز التحقق (OTP)
                    </p>
                </div>

                <!-- STEP 1: REQUEST OTP FORM -->
                <form id="request-form" onsubmit="handleRequestOTP(event)" class="space-y-5">
                    
                    <!-- Method Selector Tabs -->
                    <div class="bg-[#0B101D] p-1 rounded-xl border border-slate-800 flex items-center mb-4">
                        <button type="button" id="type-email-btn" onclick="toggleMethod('email')" class="w-1/2 py-2 rounded-lg text-xs font-bold text-white bg-brand-600 transition-all">
                            <i class="fa-solid fa-envelope ml-1"></i> البريد الإلكتروني
                        </button>
                        <button type="button" id="type-phone-btn" onclick="toggleMethod('phone')" class="w-1/2 py-2 rounded-lg text-xs font-bold text-slate-400 hover:text-slate-200 transition-all">
                            <i class="fa-brands fa-whatsapp ml-1 text-emerald-400"></i> الواتساب / الجوال
                        </button>
                    </div>

                    <!-- Email Input -->
                    <div id="email-field">
                        <label class="block text-xs font-bold text-slate-300 mb-1.5" for="reset-email">البريد الإلكتروني المسجل</label>
                        <div class="relative">
                            <i class="fa-solid fa-envelope absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                            <input type="email" id="reset-email" placeholder="name@company.com" class="w-full pr-10 pl-4 py-3 rounded-xl text-xs auth-input">
                        </div>
                    </div>

                    <!-- Phone Input (Hidden by default) -->
                    <div id="phone-field" class="hidden">
                        <label class="block text-xs font-bold text-slate-300 mb-1.5" for="reset-phone">رقم الجوال (مع الرمز الدولي)</label>
                        <div class="relative">
                            <i class="fa-solid fa-phone absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                            <input type="tel" id="reset-phone" placeholder="+966 50 000 0000" dir="ltr" class="w-full pr-10 pl-4 py-3 rounded-xl text-xs auth-input text-right">
                        </div>
                    </div>

                    <button type="submit" class="w-full py-3.5 px-4 bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 text-white font-bold text-xs sm:text-sm rounded-xl shadow-lg shadow-brand-500/25 transition-all flex items-center justify-center gap-2 active:scale-95">
                        <span>إرسال رمز التحقق</span>
                        <i class="fa-solid fa-paper-plane text-xs"></i>
                    </button>
                </form>

                <!-- STEP 2: VERIFY OTP FORM (Hidden Initially) -->
                <form id="otp-form" onsubmit="handleVerifyOTP(event)" class="space-y-6 hidden">
                    
                    <div class="text-center">
                        <span id="sent-target-text" class="text-xs bg-brand-500/10 text-brand-300 border border-brand-500/20 px-3 py-1 rounded-full font-mono">
                            تم إرسال الرمز إلى: name@company.com
                        </span>
                    </div>

                    <!-- 4-Digit OTP Boxes -->
                    <div class="flex items-center justify-center gap-3" dir="ltr">
                        <input type="text" maxlength="1" class="otp-input auth-input" onkeyup="moveOtpFocus(this, 1)" id="otp-1">
                        <input type="text" maxlength="1" class="otp-input auth-input" onkeyup="moveOtpFocus(this, 2)" id="otp-2">
                        <input type="text" maxlength="1" class="otp-input auth-input" onkeyup="moveOtpFocus(this, 3)" id="otp-3">
                        <input type="text" maxlength="1" class="otp-input auth-input" onkeyup="moveOtpFocus(this, 4)" id="otp-4">
                    </div>

                    <!-- Resend Timer -->
                    <div class="text-center text-xs text-slate-400">
                        لم يصلك الرمز؟ 
                        <button type="button" id="resend-btn" disabled onclick="resendCode()" class="text-brand-400 font-bold hover:underline disabled:opacity-50 disabled:cursor-not-allowed">
                            إعادة الإرسال (<span id="timer-count">45</span>s)
                        </button>
                    </div>

                    <button type="submit" class="w-full py-3.5 px-4 bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 text-white font-bold text-xs sm:text-sm rounded-xl shadow-lg shadow-emerald-500/25 transition-all flex items-center justify-center gap-2 active:scale-95">
                        <span>التحقق ومتابعة التغيير</span>
                        <i class="fa-solid fa-circle-check text-xs"></i>
                    </button>

                    <button type="button" onclick="resetToStep1()" class="w-full text-center text-xs text-slate-400 hover:text-white transition-colors">
                        <i class="fa-solid fa-arrow-right ml-1"></i> تغيير البريد / رقم الجوال
                    </button>
                </form>

            </div>

            <!-- Footer Link -->
            <div class="text-center text-xs text-slate-500 mt-6">
                تذكرت كلمة المرور؟ <a href="auth.html" class="text-brand-400 font-bold hover:underline">تسجيل الدخول الآن</a>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full max-w-7xl mx-auto px-4 py-4 text-center text-xs text-slate-500 relative z-20">
        جميع الحقوق محفوظة © 2026 ChatHub SaaS Inc.
    </footer>

    <div id="toast-container" class="fixed bottom-5 left-5 z-50 flex flex-col gap-3 max-w-sm"></div>

    <script>
        let currentMethod = 'email';
        let countdownInterval;

        function toggleMethod(method) {
            currentMethod = method;
            const emailField = document.getElementById('email-field');
            const phoneField = document.getElementById('phone-field');
            const btnEmail = document.getElementById('type-email-btn');
            const btnPhone = document.getElementById('type-phone-btn');

            if (method === 'email') {
                emailField.classList.remove('hidden');
                phoneField.classList.add('hidden');
                btnEmail.className = 'w-1/2 py-2 rounded-lg text-xs font-bold text-white bg-brand-600 transition-all';
                btnPhone.className = 'w-1/2 py-2 rounded-lg text-xs font-bold text-slate-400 hover:text-slate-200 transition-all';
            } else {
                phoneField.classList.remove('hidden');
                emailField.classList.add('hidden');
                btnPhone.className = 'w-1/2 py-2 rounded-lg text-xs font-bold text-white bg-brand-600 transition-all';
                btnEmail.className = 'w-1/2 py-2 rounded-lg text-xs font-bold text-slate-400 hover:text-slate-200 transition-all';
            }
        }

        function handleRequestOTP(e) {
            e.preventDefault();
            const val = currentMethod === 'email' 
                ? document.getElementById('reset-email').value 
                : document.getElementById('reset-phone').value;

            if(!val) {
                showToast('تنبيه', 'يرجى إدخال البيانات بشكل صحيح', 'fa-solid fa-triangle-exclamation text-amber-400');
                return;
            }

            document.getElementById('sent-target-text').innerText = `تم إرسال الرمز إلى: ${val}`;
            document.getElementById('request-form').classList.add('hidden');
            document.getElementById('otp-form').classList.remove('hidden');
            
            document.getElementById('step-title').innerText = 'أدخل رمز التحقق (OTP)';
            document.getElementById('step-subtitle').innerText = 'تم إرسال رمز مؤلف من 4 أرقام لتأكيد ملكيتك للحساب';

            showToast('تم إرسال الرمز!', 'يرجى مراجعة صندوق الوارد أو الواتساب', 'fa-solid fa-paper-plane text-emerald-400');
            startTimer();
        }

        function moveOtpFocus(input, index) {
            if (input.value.length >= 1 && index < 4) {
                document.getElementById(`otp-${index + 1}`).focus();
            }
        }

        function handleVerifyOTP(e) {
            e.preventDefault();
            const otp = [
                document.getElementById('otp-1').value,
                document.getElementById('otp-2').value,
                document.getElementById('otp-3').value,
                document.getElementById('otp-4').value
            ].join('');

            if(otp.length < 4) {
                showToast('خطأ في الرمز', 'يرجى إدخال كافة أرقام الرمز الـ 4', 'fa-solid fa-circle-xmark text-rose-400');
                return;
            }

            showToast('تم التحقق بنجاح!', 'جاري تحويلك لصفحة تعيين كلمة المرور الجديدة...', 'fa-solid fa-circle-check text-emerald-400');
            setTimeout(() => {
                window.location.href = 'reset-password.html';
            }, 1500);
        }

        function startTimer() {
            let count = 45;
            const timerEl = document.getElementById('timer-count');
            const resendBtn = document.getElementById('resend-btn');
            resendBtn.disabled = true;

            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                count--;
                timerEl.innerText = count;
                if(count <= 0) {
                    clearInterval(countdownInterval);
                    resendBtn.disabled = false;
                    timerEl.innerText = '0';
                }
            }, 1000);
        }

        function resendCode() {
            showToast('تم أعادة الإرسال', 'تم إرسال رمز جديد إلى حسابك', 'fa-solid fa-rotate-right text-brand-400');
            startTimer();
        }

        function resetToStep1() {
            document.getElementById('otp-form').classList.add('hidden');
            document.getElementById('request-form').classList.remove('hidden');
            document.getElementById('step-title').innerText = 'استعادة كلمة المرور';
            document.getElementById('step-subtitle').innerText = 'أدخل بريدك الإلكتروني أو رقم الجوال المسجل لاستلام رمز التحقق (OTP)';
            clearInterval(countdownInterval);
        }

        function showToast(title, desc, iconClass = 'fa-solid fa-bell text-brand-400') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'glass-panel border border-brand-500/40 p-3.5 rounded-2xl shadow-2xl flex items-center gap-3 toast-animate bg-[#0D1424] text-right';
            
            toast.innerHTML = `
                <div class="w-9 h-9 rounded-xl bg-slate-800 flex items-center justify-center text-lg shrink-0">
                    <i class="${iconClass}"></i>
                </div>
                <div>
                    <h5 class="text-xs font-bold text-white">${title}</h5>
                    <p class="text-[11px] text-slate-300 leading-tight mt-0.5">${desc}</p>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }
    </script>
</body>
</html>
